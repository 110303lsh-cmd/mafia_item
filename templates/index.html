<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mafia RPG</title>
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;}
.day{background:#f2f2f2;}
.night{background:#141428;color:white;}

header{
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111827;
    color:white;
}

header a{
    color:#60a5fa;
    text-decoration:none;
}

#topProfile{
    font-size:14px;
}

#gameLayout{
    display:flex;
    height:calc(100vh - 60px);
}

#leftPanel{
    flex:2;
    display:flex;
    flex-direction:column;
    border-right:2px solid #ccc;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

#chat li{
    list-style:none;
    margin:4px 0;
}

#chatInput{
    display:flex;
    padding:10px;
    background:white;
    border-top:2px solid #ccc;
}

#msg{
    flex:1;
    padding:10px;
}

button{
    padding:10px;
    margin:5px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

#rightPanel{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.dead{
    color:gray;
    text-decoration:line-through;
}

/* 역할 카드 */
.card{
    border-radius:12px;
    padding:20px;
    margin:10px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
    animation:fade .4s;
}

.mafia{background:#ef4444;color:white;}
.doctor{background:#22c55e;color:white;}
.police{background:#3b82f6;color:white;}
.citizen{background:#d1d5db;color:black;}

@keyframes fade{
    from{opacity:0;transform:scale(.8);}
    to{opacity:1;transform:scale(1);}
}

.shopBtn{
    background:#f59e0b;
    color:white;
}

@media(max-width:768px){
    #gameLayout{flex-direction:column;}
    #leftPanel{height:60%;}
    #rightPanel{height:40%;border-top:2px solid #ccc;}
}
</style>
</head>

<body class="day">

<header>
<div>
    <h2 style="margin:0;">🎮 Mafia RPG</h2>
</div>

<div id="topProfile">
    👤 {{ user.username }} |
    Lv.{{ user.level }} |
    EXP {{ user.exp }} |
    💰 {{ user.gold }} |
    🏆 {{ user.title }}
    |
    <a href="/logout">로그아웃</a>
</div>
</header>

<!-- 대기실 -->
<div id="lobby">
    <div style="padding:10px;">
        <h3>👥 대기실</h3>
        <button onclick="join()">입장</button>
        <button onclick="startGame()" id="startBtn">게임 시작</button>
        <button class="shopBtn" onclick="openShop()">상점</button>
        <ul id="players"></ul>
    </div>
</div>

<!-- 게임 -->
<div id="game" style="display:none;">

<div id="roleCard"></div>
<h3 id="phaseText" style="padding-left:10px;"></h3>

<div id="gameLayout">

<!-- 왼쪽 -->
<div id="leftPanel">

<ul id="chat"></ul>

<div id="chatInput">
<input id="msg" placeholder="채팅 입력..." onkeydown="if(event.key==='Enter') sendMsg()">
<button onclick="sendMsg()">전송</button>
</div>

</div>

<!-- 오른쪽 -->
<div id="rightPanel">

<h3>🟢 생존자</h3>
<ul id="aliveList"></ul>

<h3>💀 사망자</h3>
<ul id="deadList"></ul>

<h3>🗳️ 투표</h3>
<div id="voteButtons"></div>

<h3>🌙 밤 행동</h3>
<div id="nightButtons"></div>

<h3>🎒 인벤토리</h3>
<div id="inventoryBox">불러오는 중...</div>

</div>

</div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
var socket = io();

var players = [];
var myName = "{{ user.username }}";

/* 화면 전환 */
function showLobby(){
    lobby.style.display="block";
    game.style.display="none";
}

function showGame(){
    lobby.style.display="none";
    game.style.display="block";
}

/* 서버 입장 */
function join(){
    socket.emit("join", myName);
}

socket.on("join_success", ()=>{
    addChat("✅ 입장 완료");
});

/* 유저 목록 */
socket.on("user_list", list=>{
    players=list;
    playersBox="";
    players.forEach(n=>{
        playersBox += "<li>👤 "+n+"</li>";
    });
    document.getElementById("players").innerHTML=playersBox;
});

/* 게임 시작 */
function startGame(){
    console.log("게임 시작 클릭됨");
    socket.emit("start_game");
}

socket.on("phase", p=>{
    showGame();

    if(p=="day"){
        document.body.className="day";
        phaseText.innerText="☀️ 낮";
    }else{
        document.body.className="night";
        phaseText.innerText="🌙 밤";
    }
});

/* 채팅 */
function sendMsg(){
    let text = msg.value.trim();
    if(!text) return;

    socket.send(text);
    msg.value="";
}

socket.on("message", m=>{
    addChat(m);
});

function addChat(text){
    let li=document.createElement("li");
    li.innerText=text;
    chat.appendChild(li);
    chat.scrollTop=chat.scrollHeight;
}

/* 역할 카드 */
socket.on("role", role=>{
    roleCard.innerHTML="🎭 "+role;

    roleCard.className="card " + (
        role=="마피아" ? "mafia" :
        role=="의사" ? "doctor" :
        role=="경찰" ? "police" :
        "citizen"
    );
});

/* 사망 리스트 */
socket.on("dead_list", list=>{
    deadList.innerHTML="";
    aliveList.innerHTML="";

    let deadNames=[];

    list.forEach(name=>{
        deadNames.push(name.split(" (")[0]);

        let li=document.createElement("li");
        li.className="dead";
        li.innerText=name;
        deadList.appendChild(li);
    });

    players.forEach(name=>{
        if(!deadNames.includes(name)){
            let li=document.createElement("li");
            li.innerText=name;
            aliveList.appendChild(li);
        }
    });

    createButtons(deadNames);
});

/* 버튼 생성 */
function createButtons(deadNames){
    voteButtons.innerHTML="";
    nightButtons.innerHTML="";

    players.forEach(name=>{

        if(deadNames.includes(name)) return;

        let b=document.createElement("button");
        b.innerText=name;
        b.onclick=()=>socket.emit("vote", name);
        voteButtons.appendChild(b);

        let nb=document.createElement("button");
        nb.innerText=name;
        nb.onclick=()=>socket.emit("night_action", name);
        nightButtons.appendChild(nb);
    });
}

/* 상점 */
function openShop(){
    let item = prompt("구매할 아이템 입력:\n방탄조끼 / 투표강화권 / 독약");
    if(!item) return;
    location.href="/buy/"+item;
}

/* 인벤토리 */
fetch("/profile/{{ user.username }}")
.then(r=>r.json())
.then(data=>{
    let txt="";

    for(let key in data.inventory){
        txt += key + " x " + data.inventory[key] + "<br>";
    }

    if(txt=="") txt="아이템 없음";

    inventoryBox.innerHTML=txt;
});
</script>

</body>
</html>
